# Minimal, git-only prompt.
# Shows: git branch/status and the input character — nothing else.

add_newline = true
command_timeout = 1000

format = """
$git_branch$git_status\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = true
read_only = " "

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
conflicted = "≠"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
stashed = "≡"

[cmd_duration]
min_time = 2000
format = "[ %{duration}](dimmed yellow) "

# ── Languages (only show inside relevant projects) ──
[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "green"

[python]
symbol = " "
format = '[${symbol}(${version} )(\($virtualenv\) )]($style)'
style = "yellow"

[golang]
symbol = " "
style = "cyan"

[rust]
symbol = " "
style = "red"

[java]
symbol = " "
style = "red"

# ── Cloud-native context ──
[kubernetes]
disabled = false
symbol = "☸ "
format = '[$symbol$context( \($namespace\))]($style) '
style = "bold blue"
[kubernetes.context_aliases]
"arn:aws:eks:.*:cluster/(?P<cluster>.*)" = "$cluster"

[terraform]
symbol = "󱁢 "
format = "[$symbol$workspace]($style) "
style = "bold 105"

[aws]
disabled = true   # enable if you want AWS profile/region in the prompt

[docker_context]
disabled = true
